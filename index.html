<!DOCTYPE html>
<html>
<head>
    <title>DevOps Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body.theme-dark { --bg:#060818; --bg-glass:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08); --border-hover:rgba(255,255,255,0.15); --text:#e2e8f0; --text-muted:#64748b; --text-sub:#475569; --header-bg:rgba(6,8,24,0.85); --grid:rgba(255,255,255,0.04); --divider:rgba(255,255,255,0.06); --grad1:rgba(99,102,241,0.15); --grad2:rgba(16,185,129,0.10); }
        body.theme-light { --bg:#f0f4ff; --bg-glass:rgba(255,255,255,0.65); --border:rgba(0,0,0,0.08); --border-hover:rgba(99,102,241,0.3); --text:#1e293b; --text-muted:#64748b; --text-sub:#94a3b8; --header-bg:rgba(240,244,255,0.9); --grid:rgba(0,0,0,0.05); --divider:rgba(0,0,0,0.08); --grad1:rgba(99,102,241,0.12); --grad2:rgba(16,185,129,0.08); }
        body.theme-cyber { --bg:#000510; --bg-glass:rgba(0,255,200,0.03); --border:rgba(0,255,180,0.12); --border-hover:rgba(0,255,180,0.3); --text:#ccffe8; --text-muted:#00c896; --text-sub:#007a5a; --header-bg:rgba(0,5,16,0.9); --grid:rgba(0,255,180,0.04); --divider:rgba(0,255,180,0.08); --grad1:rgba(0,255,180,0.08); --grad2:rgba(0,100,255,0.06); }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; transition:background 0.4s,color 0.4s; }
        body::before { content:''; position:fixed; top:0;left:0;width:100%;height:100%; background:radial-gradient(ellipse at 20% 20%,var(--grad1) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,var(--grad2) 0%,transparent 50%); z-index:0; pointer-events:none; }
        .glass { background:var(--bg-glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:20px; transition:background 0.4s,border-color 0.4s; }
        header { position:sticky; top:0; z-index:100; padding:18px 32px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--divider); background:var(--header-bg); backdrop-filter:blur(20px); }
        .logo { display:flex; align-items:center; gap:12px; }
        .logo-icon { width:34px;height:34px; background:linear-gradient(135deg,#6366f1,#8b5cf6); border-radius:9px; display:flex;align-items:center;justify-content:center; font-size:16px; }
        header h1 { font-size:18px; font-weight:600; letter-spacing:-0.3px; }
        .header-right { display:flex; align-items:center; gap:16px; }
        .theme-switcher { display:flex; gap:6px; }
        .theme-btn { padding:5px 12px; border-radius:100px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg-glass); color:var(--text-muted); transition:all 0.2s; font-family:'Inter',sans-serif; }
        .theme-btn:hover { border-color:var(--border-hover); color:var(--text); }
        .theme-btn.active { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border-color:transparent; }
        .uptime { display:flex; align-items:center; gap:8px; color:var(--text-muted); font-size:12px; font-family:'JetBrains Mono',monospace; }
        .live-dot { width:7px;height:7px;border-radius:50%; background:#10b981;box-shadow:0 0 8px #10b981; animation:pulse 2s infinite; }
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .container { position:relative;z-index:1; padding:32px 24px; max-width:1400px; margin:0 auto; }
        .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:18px; }
        .card { padding:26px; position:relative; overflow:hidden; transition:transform 0.2s,border-color 0.2s; }
        .card::before { content:''; position:absolute;top:0;left:0;right:0;height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); }
        .card:hover { transform:translateY(-2px); border-color:var(--border-hover); }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
        .card-title { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted); }
        .badge { padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:0.5px; }
        .badge-ok   { background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.25); }
        .badge-warn { background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.25); }
        .badge-crit { background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.25); }
        .metric { font-size:50px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-2px;margin-bottom:14px;line-height:1; }
        .metric-ok{color:#10b981;} .metric-warn{color:#f59e0b;} .metric-crit{color:#ef4444;}
        .progress { height:3px;background:var(--grid);border-radius:2px;overflow:hidden; }
        .progress-bar { height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
        .bar-ok   { background:linear-gradient(90deg,#059669,#10b981); }
        .bar-warn { background:linear-gradient(90deg,#d97706,#f59e0b); }
        .bar-crit { background:linear-gradient(90deg,#dc2626,#ef4444);box-shadow:0 0 10px rgba(239,68,68,0.5); }
        .charts { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:18px; }
        .chart-card { padding:22px; min-width:0; }
        .chart-label { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:14px; }
        .chart-wrap { position:relative; height:100px; width:100%; }
        .ai-section { padding:28px; }
        .ai-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:20px; }
        .ai-title { display:flex;align-items:center;gap:10px; }
        .ai-title h2 { font-size:16px;font-weight:600; }
        .ai-tag { font-size:9px;font-weight:700;padding:3px 8px;background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.2);border-radius:100px;letter-spacing:1px;text-transform:uppercase; }
        .btn { padding:9px 22px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;transition:opacity 0.2s,transform 0.2s; }
        .btn:hover{opacity:.9;transform:translateY(-1px);} .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
        #ai-result { color:var(--text);line-height:1.8;min-height:56px;font-size:14px; }
        #ai-result.loading { color:var(--text-sub); }
        .status-bar { display:flex;gap:20px;margin-top:20px;padding-top:18px;border-top:1px solid var(--divider); }
        .status-item { display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-sub); }
        .dot { width:6px;height:6px;border-radius:50%; }
        .dot-green{background:#10b981;box-shadow:0 0 5px #10b981;} .dot-yellow{background:#f59e0b;box-shadow:0 0 5px #f59e0b;} .dot-red{background:#ef4444;box-shadow:0 0 5px #ef4444;}
    </style>
</head>
<body class="theme-dark">
<header>
    <div class="logo">
        <div class="logo-icon">🖥</div>
        <h1>DevOps Dashboard</h1>
    </div>
    <div class="header-right">
        <div class="theme-switcher">
            <button class="theme-btn active" onclick="setTheme('dark',this)">Dark</button>
            <button class="theme-btn" onclick="setTheme('light',this)">Light</button>
            <button class="theme-btn" onclick="setTheme('cyber',this)">Cyber</button>
        </div>
        <div class="uptime">
            <div class="live-dot"></div>
            <span id="last-update">—</span>
        </div>
    </div>
</header>
<div class="container">
    <div class="cards">
        <div class="card glass">
            <div class="card-header"><span class="card-title">CPU</span><span class="badge" id="cpu-badge">—</span></div>
            <div class="metric" id="cpu-val">—</div>
            <div class="progress"><div class="progress-bar" id="cpu-bar" style="width:0%"></div></div>
        </div>
        <div class="card glass">
            <div class="card-header"><span class="card-title">Память</span><span class="badge" id="mem-badge">—</span></div>
            <div class="metric" id="mem-val">—</div>
            <div class="progress"><div class="progress-bar" id="mem-bar" style="width:0%"></div></div>
        </div>
        <div class="card glass">
            <div class="card-header"><span class="card-title">Диск</span><span class="badge" id="disk-badge">—</span></div>
            <div class="metric" id="disk-val">—</div>
            <div class="progress"><div class="progress-bar" id="disk-bar" style="width:0%"></div></div>
        </div>
    </div>
    <div class="charts">
        <div class="chart-card glass"><div class="chart-label">CPU</div><div class="chart-wrap"><canvas id="cpu-chart"></canvas></div></div>
        <div class="chart-card glass"><div class="chart-label">Память</div><div class="chart-wrap"><canvas id="mem-chart"></canvas></div></div>
        <div class="chart-card glass"><div class="chart-label">Диск</div><div class="chart-wrap"><canvas id="disk-chart"></canvas></div></div>
    </div>
    <div class="ai-section glass">
        <div class="ai-header">
            <div class="ai-title"><h2>AI Анализ</h2><span class="ai-tag">LLaMA 3.3</span></div>
            <button class="btn" id="analyze-btn" onclick="analyze()">Анализировать</button>
        </div>
        <div id="ai-result">Нажми кнопку для анализа системы.</div>
        <div class="status-bar">
            <div class="status-item"><div class="dot dot-green"></div> Норма: 0–60%</div>
            <div class="status-item"><div class="dot dot-yellow"></div> Внимание: 60–80%</div>
            <div class="status-item"><div class="dot dot-red"></div> Критично: 80%+</div>
        </div>
    </div>
</div>
<script>
    function setTheme(name,el){document.body.className='theme-'+name;document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');localStorage.setItem('theme',name);}
    const saved=localStorage.getItem('theme');if(saved){document.body.className='theme-'+saved;document.querySelectorAll('.theme-btn').forEach(b=>{if(b.textContent.toLowerCase()===saved)b.classList.add('active');else b.classList.remove('active');});}
    const hist={cpu:[],mem:[],disk:[]},MAX=20;
    function status(v){return v<60?'ok':v<80?'warn':'crit';}
    function lbl(s){return{ok:'Норма',warn:'Внимание',crit:'Критично'}[s];}
    function updateCard(id,val){const s=status(val);document.getElementById(id+'-val').textContent=val+'%';document.getElementById(id+'-val').className='metric metric-'+s;document.getElementById(id+'-badge').textContent=lbl(s);document.getElementById(id+'-badge').className='badge badge-'+s;document.getElementById(id+'-bar').style.width=val+'%';document.getElementById(id+'-bar').className='progress-bar bar-'+s;}
    function makeChart(id,color){return new Chart(document.getElementById(id),{type:'line',data:{labels:[],datasets:[{data:[],borderColor:color,backgroundColor:color+'18',fill:true,tension:0.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{min:0,max:100,ticks:{color:'#64748b',callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}}},animation:false}});}
    const charts={cpu:makeChart('cpu-chart','#6366f1'),mem:makeChart('mem-chart','#10b981'),disk:makeChart('disk-chart','#f59e0b')};
    function pushChart(chart,arr,val){arr.push(val);if(arr.length>MAX)arr.shift();chart.data.labels=arr.map((_,i)=>i);chart.data.datasets[0].data=[...arr];chart.update();}
    async function loadStats(){try{const d=await(await fetch('/stats')).json();updateCard('cpu',d.cpu);updateCard('mem',d.memory);updateCard('disk',d.disk);pushChart(charts.cpu,hist.cpu,d.cpu);pushChart(charts.mem,hist.mem,d.memory);pushChart(charts.disk,hist.disk,d.disk);document.getElementById('last-update').textContent=new Date().toLocaleTimeString();}catch(e){console.error(e);}}
    async function analyze(){const btn=document.getElementById('analyze-btn');btn.disabled=true;btn.textContent='Анализирую...';const res=document.getElementById('ai-result');res.className='loading';res.textContent='⏳ Анализирую систему...';try{const d=await(await fetch('/analyze')).json();res.className='';res.textContent=d.ai_analysis;}catch(e){res.textContent='Ошибка при анализе.';}btn.disabled=false;btn.textContent='Анализировать';}
    loadStats();setInterval(loadStats,3000);
</script>
</body>
</html>
