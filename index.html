<!DOCTYPE html>
<html>
<head>
    <title>DevOps Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #060818; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(16,185,129,0.1) 0%, transparent 50%); z-index: 0; pointer-events: none; }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        header { position: relative; z-index: 10; padding: 24px 48px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(6,8,24,0.8); backdrop-filter: blur(20px); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        header h1 { font-size: 20px; font-weight: 600; color: #f1f5f9; letter-spacing: -0.3px; }
        .header-right { display: flex; align-items: center; gap: 8px; color: #64748b; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .container { position: relative; z-index: 1; padding: 40px 48px; max-width: 1400px; margin: 0 auto; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .card { padding: 28px; transition: transform 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); }
        .card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #64748b; }
        .badge { padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
        .badge-ok { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
        .badge-warn { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
        .badge-crit { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .metric { font-size: 52px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -2px; margin-bottom: 16px; line-height: 1; }
        .metric-ok { color: #10b981; } .metric-warn { color: #f59e0b; } .metric-crit { color: #ef4444; }
        .progress { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
        .bar-ok { background: linear-gradient(90deg, #059669, #10b981); }
        .bar-warn { background: linear-gradient(90deg, #d97706, #f59e0b); }
        .bar-crit { background: linear-gradient(90deg, #dc2626, #ef4444); box-shadow: 0 0 12px rgba(239,68,68,0.4); }
        .charts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .chart-card { padding: 24px; }
        .chart-card h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #64748b; margin-bottom: 16px; }
        .ai-section { padding: 32px; }
        .ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .ai-title { display: flex; align-items: center; gap: 12px; }
        .ai-title h2 { font-size: 17px; font-weight: 600; color: #f1f5f9; }
        .ai-tag { font-size: 10px; font-weight: 600; padding: 3px 8px; background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); border-radius: 100px; letter-spacing: 0.5px; text-transform: uppercase; }
        .btn { padding: 10px 24px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; transition: opacity 0.2s, transform 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        #ai-result { color: #cbd5e1; line-height: 1.8; min-height: 60px; font-size: 15px; }
        #ai-result.loading { color: #475569; }
        .status-bar { display: flex; gap: 24px; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); }
        .status-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #475569; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-green { background: #10b981; box-shadow: 0 0 6px #10b981; }
        .dot-yellow { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
        .dot-red { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">🖥</div>
            <h1>DevOps Dashboard</h1>
        </div>
        <div class="header-right">
            <div class="live-dot"></div>
            Последнее обновление: <span id="last-update">—</span>
        </div>
    </header>
    <div class="container">
        <div class="cards">
            <div class="card glass">
                <div class="card-header"><span class="card-title">CPU</span><span class="badge" id="cpu-badge">—</span></div>
                <div class="metric" id="cpu-val">—</div>
                <div class="progress"><div class="progress-bar" id="cpu-bar" style="width:0%"></div></div>
            </div>
            <div class="card glass">
                <div class="card-header"><span class="card-title">Память</span><span class="badge" id="mem-badge">—</span></div>
                <div class="metric" id="mem-val">—</div>
                <div class="progress"><div class="progress-bar" id="mem-bar" style="width:0%"></div></div>
            </div>
            <div class="card glass">
                <div class="card-header"><span class="card-title">Диск</span><span class="badge" id="disk-badge">—</span></div>
                <div class="metric" id="disk-val">—</div>
                <div class="progress"><div class="progress-bar" id="disk-bar" style="width:0%"></div></div>
            </div>
        </div>
        <div class="charts">
            <div class="chart-card glass"><h3>CPU история</h3><canvas id="cpu-chart" height="100"></canvas></div>
            <div class="chart-card glass"><h3>Память история</h3><canvas id="mem-chart" height="100"></canvas></div>
            <div class="chart-card glass"><h3>Диск история</h3><canvas id="disk-chart" height="100"></canvas></div>
        </div>
        <div class="ai-section glass">
            <div class="ai-header">
                <div class="ai-title">
                    <h2>AI Анализ</h2>
                    <span class="ai-tag">LLaMA 3.3</span>
                </div>
                <button class="btn" id="analyze-btn" onclick="analyze()">Анализировать</button>
            </div>
            <div id="ai-result">Нажми кнопку для анализа системы.</div>
            <div class="status-bar">
                <div class="status-item"><div class="dot dot-green"></div> Норма: 0–60%</div>
                <div class="status-item"><div class="dot dot-yellow"></div> Внимание: 60–80%</div>
                <div class="status-item"><div class="dot dot-red"></div> Критично: 80%+</div>
            </div>
        </div>
    </div>
    <script>
        const history = { cpu: [], mem: [], disk: [] };
        const maxPoints = 20;
        function getStatus(val) { if (val < 60) return 'ok'; if (val < 80) return 'warn'; return 'crit'; }
        function updateCard(id, val) {
            const status = getStatus(val);
            const labels = { ok: 'Норма', warn: 'Внимание', crit: 'Критично' };
            document.getElementById(id+'-val').textContent = val+'%';
            document.getElementById(id+'-val').className = 'metric metric-'+status;
            document.getElementById(id+'-badge').textContent = labels[status];
            document.getElementById(id+'-badge').className = 'badge badge-'+status;
            document.getElementById(id+'-bar').style.width = val+'%';
            document.getElementById(id+'-bar').className = 'progress-bar bar-'+status;
        }
        function makeChart(id, color) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: color, backgroundColor: color+'18', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { min: 0, max: 100, ticks: { color: '#475569', callback: v => v+'%', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } } }, animation: false }
            });
        }
        const charts = { cpu: makeChart('cpu-chart','#6366f1'), mem: makeChart('mem-chart','#10b981'), disk: makeChart('disk-chart','#f59e0b') };
        function updateChart(chart, histArr, val) {
            histArr.push(val);
            if (histArr.length > maxPoints) histArr.shift();
            chart.data.labels = histArr.map((_,i) => i);
            chart.data.datasets[0].data = [...histArr];
            chart.update();
        }
        async function loadStats() {
            try {
                const r = await fetch('/stats');
                const data = await r.json();
                updateCard('cpu', data.cpu); updateCard('mem', data.memory); updateCard('disk', data.disk);
                updateChart(charts.cpu, history.cpu, data.cpu);
                updateChart(charts.mem, history.mem, data.memory);
                updateChart(charts.disk, history.disk, data.disk);
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch(e) { console.error(e); }
        }
        async function analyze() {
            const btn = document.getElementById('analyze-btn');
            btn.disabled = true; btn.textContent = 'Анализирую...';
            document.getElementById('ai-result').className = 'loading';
            document.getElementById('ai-result').textContent = '⏳ Анализирую систему...';
            try {
                const r = await fetch('/analyze');
                const data = await r.json();
                document.getElementById('ai-result').className = '';
                document.getElementById('ai-result').textContent = data.ai_analysis;
            } catch(e) { document.getElementById('ai-result').textContent = 'Ошибка при анализе.'; }
            btn.disabled = false; btn.textContent = 'Анализировать';
        }
        loadStats();
        setInterval(loadStats, 3000);
    </script>
</body>
</html>
