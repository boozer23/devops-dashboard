<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevOps Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: #111217;
  color: #c8ccd8;
  min-height: 100vh;
  display: flex;
  overflow: hidden;
}

.sidebar {
  width: 48px;
  background: #0d0e11;
  border-right: 1px solid #1c1e26;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0;
  gap: 4px;
  flex-shrink: 0;
}

.s-logo {
  width: 28px; height: 28px;
  background: #e07830;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  margin-bottom: 12px;
  color: #fff;
  font-weight: 700;
}

.s-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
  color: #404455;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
}
.s-btn:hover { background: #1c1e26; color: #c8ccd8; }
.s-btn.active { background: #1c1e26; color: #e07830; }

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  background: #0d0e11;
  border-bottom: 1px solid #1c1e26;
  padding: 0 16px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.h-left { display: flex; align-items: center; gap: 10px; }
.h-icon { color: #e07830; font-size: 13px; }
.h-title { font-size: 13px; font-weight: 600; color: #e8eaf0; }

.h-right { display: flex; align-items: center; gap: 12px; }

.h-controls { display: flex; gap: 6px; }
.h-btn {
  width: 28px; height: 24px;
  background: #1c1e26;
  border: 1px solid #252830;
  border-radius: 3px;
  color: #6b7080;
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.h-btn:hover { color: #c8ccd8; }

.h-time-wrap { display: flex; align-items: center; gap: 6px; }
.h-range {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #6b7080;
  background: #1c1e26;
  border: 1px solid #252830;
  border-radius: 3px;
  padding: 2px 8px;
}

.h-time {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #404455;
  display: flex; align-items: center; gap: 5px;
}

.status-dot { width: 5px; height: 5px; border-radius: 50%; background: #e07830; }
.status-dot.live { background: #3d9e4a; box-shadow: 0 0 4px #3d9e4a; }

.btn-analyze {
  padding: 3px 10px;
  background: #1c1e26;
  border: 1px solid #252830;
  color: #c8ccd8;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
}
.btn-analyze:hover { background: #252830; }
.btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

/* GRID */
.grid {
  flex: 1;
  display: grid;
  grid-template-columns: 140px repeat(3, 1fr) 180px;
  grid-template-rows: repeat(3, 1fr) 36px;
  gap: 1px;
  background: #1c1e26;
  overflow: hidden;
}

.panel {
  background: #111217;
  padding: 10px 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.p-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #3a3d4a;
  margin-bottom: 6px;
  flex-shrink: 0;
}

.metric {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 32px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -1px;
  color: #e8eaf0;
}

.metric.warn { color: #e0a030; }
.metric.crit { color: #e05252; }

.m-sub {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 5px;
  color: #3d9e4a;
}
.m-sub.warn { color: #e0a030; }
.m-sub.crit { color: #e05252; }

.bar {
  height: 2px;
  background: #1c1e26;
  margin-top: 8px;
  flex-shrink: 0;
}
.bar-fill {
  height: 100%;
  background: #e07830;
  transition: width 0.6s ease;
}
.bar-fill.ok { background: #3d9e4a; }
.bar-fill.warn { background: #e0a030; }
.bar-fill.crit { background: #e05252; }

.chart-wrap { flex: 1; position: relative; min-height: 0; }

/* STAT TABLE */
.stat-table { flex: 1; display: flex; flex-direction: column; gap: 7px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; }
.stat-k { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #3a3d4a; }
.stat-v { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #e8eaf0; font-weight: 600; }
.stat-v.ok { color: #3d9e4a; }
.stat-v.warn { color: #e0a030; }
.stat-v.crit { color: #e05252; }

/* BOTTOM BAR */
.bottom-bar {
  grid-column: 1 / -1;
  background: #0d0e11;
  border-top: 1px solid #1c1e26;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 16px;
  overflow: hidden;
}

.ai-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #3a3d4a; flex-shrink: 0; }
.ai-model { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #252830; flex-shrink: 0; }
#ai-result { font-size: 11px; color: #6b7080; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'IBM Plex Mono', monospace; }

.legend { display: flex; gap: 12px; flex-shrink: 0; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #252830; font-family: 'IBM Plex Mono', monospace; }
.leg-dot { width: 5px; height: 5px; border-radius: 50%; }
</style>
</head>

<body>
<div class="sidebar">
  <div class="s-logo">D</div>
  <div class="s-btn active">⊞</div>
  <a class="s-btn" href="http://localhost:9091" target="_blank">◉</a>
  <a class="s-btn" href="http://localhost:3000" target="_blank">📊</a>
  <div class="s-btn">⚙</div>
</div>

<div class="main">
  <header>
    <div class="h-left">
      <span class="h-icon">⊞</span>
      <span class="h-title">DevOps Dashboard</span>
    </div>
    <div class="h-right">
      <div class="h-controls">
        <button class="h-btn">←</button>
        <button class="h-btn">→</button>
      </div>
      <span class="h-range">Last 6 hours</span>
      <div class="h-time">
        <div class="status-dot live" id="status-dot"></div>
        <span id="last-update">—</span>
      </div>
      <button class="btn-analyze" id="analyze-btn" onclick="analyze()">Analyze</button>
    </div>
  </header>

  <div class="grid">
    <!-- Row 1 -->
    <div class="panel">
      <div class="p-title">CPU</div>
      <div class="metric" id="cpu-val">—</div>
      <div class="m-sub" id="cpu-st">—</div>
      <div class="bar"><div class="bar-fill ok" id="cpu-bar" style="width:0%"></div></div>
    </div>
    <div class="panel" style="grid-column: span 2;">
      <div class="p-title">CPU History</div>
      <div class="chart-wrap"><canvas id="cpu-chart"></canvas></div>
    </div>
    <div class="panel">
      <div class="p-title">Memory History</div>
      <div class="chart-wrap"><canvas id="mem-chart"></canvas></div>
    </div>
    <div class="panel">
      <div class="p-title">System</div>
      <div class="stat-table">
        <div class="stat-row"><span class="stat-k">cpu</span><span class="stat-v" id="s-cpu">—</span></div>
        <div class="stat-row"><span class="stat-k">memory</span><span class="stat-v" id="s-mem">—</span></div>
        <div class="stat-row"><span class="stat-k">disk</span><span class="stat-v" id="s-disk">—</span></div>
        <div class="stat-row"><span class="stat-k">cpu_st</span><span class="stat-v ok" id="s-cpu-st">—</span></div>
        <div class="stat-row"><span class="stat-k">mem_st</span><span class="stat-v ok" id="s-mem-st">—</span></div>
        <div class="stat-row"><span class="stat-k">disk_st</span><span class="stat-v ok" id="s-disk-st">—</span></div>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="panel">
      <div class="p-title">Memory</div>
      <div class="metric" id="mem-val">—</div>
      <div class="m-sub" id="mem-st">—</div>
      <div class="bar"><div class="bar-fill ok" id="mem-bar" style="width:0%"></div></div>
    </div>
    <div class="panel" style="grid-column: span 2;">
      <div class="p-title">Disk History</div>
      <div class="chart-wrap"><canvas id="disk-chart"></canvas></div>
    </div>
    <div class="panel">
      <div class="p-title">Disk</div>
      <div class="metric" id="disk-val">—</div>
      <div class="m-sub" id="disk-st">—</div>
      <div class="bar"><div class="bar-fill ok" id="disk-bar" style="width:0%"></div></div>
    </div>
    <div class="panel">
      <div class="p-title">Alerts</div>
      <div class="stat-table">
        <div class="stat-row"><span class="stat-k">cpu &gt; 80%</span><span class="stat-v ok" id="a-cpu">ok</span></div>
        <div class="stat-row"><span class="stat-k">mem &gt; 80%</span><span class="stat-v ok" id="a-mem">ok</span></div>
        <div class="stat-row"><span class="stat-k">disk &gt; 80%</span><span class="stat-v ok" id="a-disk">ok</span></div>
      </div>
    </div>

    <!-- Row 3 -->
    <div class="panel">
      <div class="p-title">Uptime</div>
      <div class="metric" style="font-size:22px;color:#e07830;" id="uptime-val">—</div>
      <div class="m-sub" style="color:#e07830;">running</div>
    </div>
    <div class="panel" style="grid-column: span 4;">
      <div class="p-title">Combined History</div>
      <div class="chart-wrap"><canvas id="combined-chart"></canvas></div>
    </div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <span class="ai-label">Analysis</span>
      <span class="ai-model">llama-3.3-70b</span>
      <div id="ai-result">—</div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#3d9e4a"></div>0–60</div>
        <div class="leg"><div class="leg-dot" style="background:#e0a030"></div>60–80</div>
        <div class="leg"><div class="leg-dot" style="background:#e05252"></div>80+</div>
      </div>
    </div>
  </div>
</div>

<script>
const st = v => v < 60 ? 'ok' : v < 80 ? 'warn' : 'crit';
const lb = s => ({ ok: 'normal', warn: 'warning', crit: 'critical' }[s]);

function updMetric(id, val) {
  const s = st(val);
  document.getElementById(id + '-val').textContent = val + '%';
  document.getElementById(id + '-val').className = 'metric ' + (s !== 'ok' ? s : '');
  document.getElementById(id + '-st').textContent = lb(s);
  document.getElementById(id + '-st').className = 'm-sub ' + (s !== 'ok' ? s : '');
  document.getElementById(id + '-bar').style.width = val + '%';
  document.getElementById(id + '-bar').className = 'bar-fill ' + s;
}

function updSystem(cpu, mem, disk) {
  const sc = st(cpu), sm = st(mem), sd = st(disk);
  document.getElementById('s-cpu').textContent = cpu + '%';
  document.getElementById('s-mem').textContent = mem + '%';
  document.getElementById('s-disk').textContent = disk + '%';
  document.getElementById('s-cpu-st').textContent = lb(sc);
  document.getElementById('s-cpu-st').className = 'stat-v ' + sc;
  document.getElementById('s-mem-st').textContent = lb(sm);
  document.getElementById('s-mem-st').className = 'stat-v ' + sm;
  document.getElementById('s-disk-st').textContent = lb(sd);
  document.getElementById('s-disk-st').className = 'stat-v ' + sd;
  document.getElementById('a-cpu').textContent = lb(sc);
  document.getElementById('a-cpu').className = 'stat-v ' + sc;
  document.getElementById('a-mem').textContent = lb(sm);
  document.getElementById('a-mem').className = 'stat-v ' + sm;
  document.getElementById('a-disk').textContent = lb(sd);
  document.getElementById('a-disk').className = 'stat-v ' + sd;
}

function makeChart(id, color, fill) {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: { labels: [], datasets: [{ data: [], borderColor: color, backgroundColor: fill || color + '18', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1.5 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { min: 0, max: 100, ticks: { color: '#252830', font: { size: 9, family: 'IBM Plex Mono' }, callback: v => v + '%' }, grid: { color: '#161820' } }
      },
      animation: false
    }
  });
}

function makeCombined(id) {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: 'CPU', data: [], borderColor: '#5b8dd9', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0, borderWidth: 1.5, fill: false },
        { label: 'Memory', data: [], borderColor: '#3d9e4a', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0, borderWidth: 1.5, fill: false },
        { label: 'Disk', data: [], borderColor: '#e0a030', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0, borderWidth: 1.5, fill: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'top', align: 'end', labels: { color: '#404455', font: { size: 10, family: 'IBM Plex Mono' }, boxWidth: 12, padding: 12 } }
      },
      scales: {
        x: { display: false },
        y: { min: 0, max: 100, ticks: { color: '#252830', font: { size: 9, family: 'IBM Plex Mono' }, callback: v => v + '%' }, grid: { color: '#161820' } }
      },
      animation: false
    }
  });
}

const hist = { cpu: [], mem: [], disk: [] }, MAX = 40;
const charts = {
  cpu: makeChart('cpu-chart', '#5b8dd9'),
  mem: makeChart('mem-chart', '#3d9e4a'),
  disk: makeChart('disk-chart', '#e0a030'),
  combined: makeCombined('combined-chart')
};

function push(arr, val) {
  arr.push(val);
  if (arr.length > MAX) arr.shift();
}

function updChart(chart, arr, val, dsIdx) {
  push(arr, val);
  if (dsIdx !== undefined) {
    chart.data.datasets[dsIdx].data = [...arr];
  } else {
    chart.data.labels = arr.map((_, i) => i);
    chart.data.datasets[0].data = [...arr];
  }
  chart.update();
}

// Uptime
const startTime = Date.now();
function updUptime() {
  const s = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sc = s % 60;
  document.getElementById('uptime-val').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(sc).padStart(2,'0');
}
setInterval(updUptime, 1000);
updUptime();

async function loadStats() {
  try {
    const d = await (await fetch('/stats')).json();
    updMetric('cpu', d.cpu);
    updMetric('mem', d.memory);
    updMetric('disk', d.disk);
    updSystem(d.cpu, d.memory, d.disk);

    push(hist.cpu, d.cpu);
    push(hist.mem, d.memory);
    push(hist.disk, d.disk);
    const labels = hist.cpu.map((_, i) => i);

    charts.cpu.data.labels = labels;
    charts.cpu.data.datasets[0].data = [...hist.cpu];
    charts.cpu.update();

    charts.mem.data.labels = labels;
    charts.mem.data.datasets[0].data = [...hist.mem];
    charts.mem.update();

    charts.disk.data.labels = labels;
    charts.disk.data.datasets[0].data = [...hist.disk];
    charts.disk.update();

    charts.combined.data.labels = labels;
    charts.combined.data.datasets[0].data = [...hist.cpu];
    charts.combined.data.datasets[1].data = [...hist.mem];
    charts.combined.data.datasets[2].data = [...hist.disk];
    charts.combined.update();

    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
    document.getElementById('status-dot').className = 'status-dot live';
  } catch(e) {
    document.getElementById('status-dot').className = 'status-dot';
  }
}

async function analyze() {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('ai-result').textContent = 'analyzing...';
  try {
    const d = await (await fetch('/analyze')).json();
    document.getElementById('ai-result').textContent = d.ai_analysis;
  } catch(e) {
    document.getElementById('ai-result').textContent = 'error';
  }
  btn.disabled = false; btn.textContent = 'Analyze';
}

loadStats();
setInterval(loadStats, 3000);
</script>
</body>
</html>
