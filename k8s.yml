apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-dashboard
  template:
    metadata:
      labels:
        app: devops-dashboard
    spec:
      containers:
        - name: devops-dashboard
          image: devops-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-secret
                  key: api-key
---
apiVersion: v1
kind: Service
metadata:
  name: devops-dashboard
spec:
  selector:
    app: devops-dashboard
  ports:
    - port: 5002
      targetPort: 5002
  type: NodePort